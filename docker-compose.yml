services:
  mongodb:
    image: mongo:latest
    container_name: vehicle-record-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: vehicle-record-backend
    environment:
      MONGODB_URI: mongodb://mongodb:27017/vehicle-records
      PORT: 3000
    depends_on:
      - mongodb
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vehicle-record-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mongo-data:
    name: vehicle-record-mongo-data
